<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyTracker Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans pb-20">

    <header class="bg-indigo-700 text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <h1 class="text-2xl font-bold">My Daily Tracker</h1>
        <p class="text-indigo-200 text-sm">Tasks & Finance</p>
    </header>

    <main class="px-4 space-y-6">
        
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
            <h2 class="text-gray-400 uppercase text-xs font-bold tracking-widest mb-1">Total Spending</h2>
            <div id="totalDisplay" class="text-3xl font-bold text-slate-800">₹0</div>
            
            <div class="mt-4 space-y-2">
                <div class="flex gap-2">
                    <input id="expName" type="text" placeholder="What for?" class="w-2/3 bg-slate-50 border rounded-lg p-3 text-sm">
                    <input id="expAmt" type="number" placeholder="₹" class="w-1/3 bg-slate-50 border rounded-lg p-3 text-sm">
                </div>
                <button onclick="addExpense()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold shadow-md active:bg-green-700">Add Expense</button>
            </div>
            <ul id="expenseList" class="mt-4 space-y-1 text-sm text-gray-500"></ul>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
            <h2 class="text-slate-800 font-bold mb-4">Study & Personal Tasks</h2>
            <div class="flex gap-2 mb-4">
                <input id="taskIn" type="text" placeholder="Add a task..." class="flex-grow bg-slate-50 border rounded-lg p-3 text-sm">
                <button onclick="addTask()" class="bg-indigo-600 text-white px-4 py-3 rounded-lg font-bold shadow-md active:bg-indigo-700">Add</button>
            </div>
            <ul id="taskList" class="space-y-3"></ul>
        </div>
    </main>

    <script>
        // Load data immediately
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        let expenses = JSON.parse(localStorage.getItem('myExpenses')) || [];

        function renderAll() {
            // Render Tasks
            const tList = document.getElementById('taskList');
            tList.innerHTML = tasks.map((t, i) => `
                <li class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="${t.done ? 'line-through text-gray-400' : 'text-slate-700'}">${t.text}</span>
                    <button onclick="toggleTask(${i})" class="px-3 py-1 rounded-lg text-xs font-bold ${t.done ? 'bg-green-100 text-green-600' : 'bg-indigo-100 text-indigo-600'}">
                        ${t.done ? 'DONE' : 'CHECK'}
                    </button>
                </li>
            `).join('');

            // Render Expenses
            const eList = document.getElementById('expenseList');
            eList.innerHTML = expenses.slice().reverse().map(e => `
                <li class="flex justify-between border-b border-slate-50 py-1">
                    <span>${e.name}</span>
                    <span class="font-bold">₹${e.amt}</span>
                </li>
            `).join('');

            const total = expenses.reduce((sum, e) => sum + e.amt, 0);
            document.getElementById('totalDisplay').innerText = "₹" + total.toLocaleString('en-IN');
            
            // Save to phone memory
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            localStorage.setItem('myExpenses', JSON.stringify(expenses));
        }

        function addTask() {
            const input = document.getElementById('taskIn');
            if(!input.value.trim()) return;
            tasks.push({ text: input.value, done: false });
            input.value = '';
            renderAll();
        }

        function toggleTask(i) {
            tasks[i].done = !tasks[i].done;
            renderAll();
        }

        function addExpense() {
            const n = document.getElementById('expName');
            const a = document.getElementById('expAmt');
            if(!n.value || !a.value) return;
            expenses.push({ name: n.value, amt: parseFloat(a.value) });
            n.value = ''; a.value = '';
            renderAll();
        }

        // Run on startup
        renderAll();
    </script>
</body>
</html>
