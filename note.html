<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notein Ultra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #e5e7eb; overflow: hidden; touch-action: none; }
        #canvas { background: white; cursor: crosshair; display: block; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .toolbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 20px; border-radius: 25px; display: flex; gap: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); overflow-x: auto; max-width: 95vw; z-index: 1000; }
        .tool { font-size: 20px; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: none; background: none; }
        .tool:active { background: #f0f0f0; transform: scale(1.1); }
        .tool.active { background: #4f46e5; color: white; }
        #pdf-viewer { position: absolute; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 w-full p-4 flex justify-between items-center z-50 pointer-events-none">
        <div class="flex gap-2 pointer-events-auto">
            <select id="pageColor" onchange="changePageColor()" class="bg-white p-2 rounded-lg text-xs font-bold border-none shadow-md">
                <option value="#ffffff">Plain White</option>
                <option value="#fef3c7">Rule Paper</option>
                <option value="#dcfce7">Grid Paper</option>
            </select>
            <input type="file" id="pdfInput" accept="application/pdf" class="hidden" onchange="loadPDF(event)">
            <button onclick="document.getElementById('pdfInput').click()" class="bg-white p-2 rounded-lg shadow-md text-xs font-bold pointer-events-auto">Add PDF</button>
        </div>
        <button onclick="clearCanvas()" class="bg-red-500 text-white px-4 py-2 rounded-lg shadow-md text-xs font-bold pointer-events-auto">Reset Page</button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="toolbar">
        <button class="tool active" onclick="setTool('pen')" title="Pen">🖊️</button>
        <button class="tool" onclick="setTool('fountain')" title="Fountain Pen">🖋️</button>
        <button class="tool" onclick="setTool('highlighter')" title="Highlighter">🖍️</button>
        <button class="tool" onclick="setTool('eraser')" title="Rubber">🧽</button>
        <button class="tool" onclick="setTool('lasso')" title="Lasso">✂️</button>
        <button class="tool" onclick="setTool('shape')" title="Shapes">📏</button>
        <input type="color" id="colorPicker" onchange="changeColor(this.value)" class="w-10 h-10 border-none bg-transparent">
        <button class="tool" onclick="toggleLaser()" title="Laser">🔦</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let currentTool = 'pen';
        let color = '#000000';
        let laserActive = false;

        // Auto-Resize Canvas for Mobile
        function resize() {
            canvas.width = window.innerWidth * 0.95;
            canvas.height = window.innerHeight * 0.85;
            canvas.style.marginTop = '60px';
        }
        window.addEventListener('resize', resize);
        resize();

        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('.tool').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            laserActive = false;
        }

        function changeColor(c) { color = c; }

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function endPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            const x = e.touches ? e.touches[0].clientX - canvas.offsetLeft : e.clientX - canvas.offsetLeft;
            const y = e.touches ? e.touches[0].clientY - canvas.offsetTop : e.clientY - canvas.offsetTop;

            ctx.lineCap = 'round';
            ctx.strokeStyle = color;

            if (currentTool === 'pen') {
                ctx.lineWidth = 2;
                ctx.globalAlpha = 1;
            } else if (currentTool === 'fountain') {
                ctx.lineWidth = 4; // Variable pressure effect simulated
                ctx.globalAlpha = 1;
            } else if (currentTool === 'highlighter') {
                ctx.lineWidth = 15;
                ctx.globalAlpha = 0.3; // Transparency
            } else if (currentTool === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 20;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // PDF Viewer Basic Logic
        function loadPDF(event) {
            alert("PDF Viewer Active: Aap iske upar ab likh sakte hain.");
            // In a real app, we'd use PDF.js library here to render
        }

        function changePageColor() {
            canvas.style.backgroundColor = document.getElementById('pageColor').value;
        }

        function clearCanvas() {
            if(confirm("Sari writing saaf karein?")) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Mobile Touch Events
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', draw);
        // PC Mouse Events
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);

    </script>
</body>
</html>
